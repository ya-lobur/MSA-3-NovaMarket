http {
    upstream logistics_backend {
        server logistics.company.com max_fails=5 fail_timeout=30s;
    }

    server {
        listen 8080;

        location /logistics/ {
            proxy_pass http://logistics_backend;

            # Таймауты установлены на 3 секунды
            proxy_connect_timeout 3s;
            proxy_read_timeout 3s;
            proxy_send_timeout 3s;

            # Обработка ошибок от upstream
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
            proxy_next_upstream_tries 1;

            # Fallback-ответ при недоступности сервиса
            error_page 502 503 504 = @fallback;
        }

        # Fallback-локация, которая возвращает контролируемый ответ
        location @fallback {
            default_type application/json;
            return 503 '{"error": "Logistics service is temporarily unavailable. Please try again later."}';
        }
    }
}
